<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>voya. · Travel more. Plan less.</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <style>
    html, body { margin: 0; padding: 0; background: var(--bg-page); color: var(--fg-1); }
    body { font-family: var(--font-body); }
    * { box-sizing: border-box; }
    a { color: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>

  <script type="text/babel" src="VoyaWebUI.jsx"></script>
  <script type="text/babel" src="HeroSection.jsx"></script>
  <script type="text/babel" src="PageSections.jsx"></script>

  <script type="text/babel">
    function App() {
      React.useEffect(() => { window.lucide && lucide.createIcons(); });
      return (
        <>
          <NavBar/>
          <HeroSection/>
          <FeaturesSection/>
          <HowItWorksSection/>
          <DestinationsSection/>
          <PricingSection/>
          <FinalCTASection/>
          <FooterSection/>
        </>
      );
    }
    function tryMount(attempt) {
      attempt = attempt || 0;
      const need = ['NavBar','HeroSection','FeaturesSection','HowItWorksSection',
                    'DestinationsSection','PricingSection','FinalCTASection','FooterSection',
                    'Logo','WButton','WIcon'];
      const missing = need.filter(n => typeof window[n] === 'undefined');
      if (missing.length && attempt < 60) { setTimeout(() => tryMount(attempt + 1), 50); return; }
      if (missing.length) {
        document.getElementById('root').innerHTML =
          '<pre style="padding:20px;color:#b53a25;font:13px monospace">Missing: ' + missing.join(', ') + '</pre>';
        return;
      }
      ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
      setTimeout(() => window.lucide && lucide.createIcons(), 100);
    }
    tryMount();
  </script>
</body>
</html>
