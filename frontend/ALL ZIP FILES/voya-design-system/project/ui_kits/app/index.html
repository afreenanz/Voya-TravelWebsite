<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Voya · Mobile UI Kit</title>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <style>
    html, body { margin: 0; padding: 0; min-height: 100vh; background: var(--voya-cream); }
    body {
      font-family: var(--font-body);
      color: var(--fg-1);
      display: flex; flex-direction: column; align-items: center;
      padding: 36px 24px 60px;
      gap: 28px;
    }
    .heading {
      max-width: 920px; width: 100%; text-align: center;
    }
    .heading .eyebrow {
      font-family: var(--font-display); font-weight: 800; font-size: 11px;
      letter-spacing: 0.20em; text-transform: uppercase; color: var(--voya-ocean);
    }
    .heading h1 {
      font-family: var(--font-display); font-weight: 900;
      font-size: 36px; color: var(--voya-navy); letter-spacing: -0.02em;
      margin: 8px 0 6px; line-height: 1.05;
    }
    .heading p {
      font-family: var(--font-body); color: var(--fg-2); font-size: 15px; margin: 0;
      max-width: 540px; margin-inline: auto;
    }
    .screens {
      display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
      margin-top: 6px;
    }
    .screens button {
      font-family: var(--font-display); font-weight: 700; font-size: 13px;
      padding: 8px 14px; border-radius: 999px; border: 0; cursor: pointer;
      background: #fff; color: var(--voya-navy);
      box-shadow: 0 2px 6px rgba(12,68,124,0.10);
    }
    .screens button.on { background: var(--voya-navy); color: #fff; }
    .device-wrap { display: flex; justify-content: center; }
  </style>
</head>
<body>
  <div class="heading">
    <span class="eyebrow">UI KIT · MOBILE APP</span>
    <h1>voya. on your phone</h1>
    <p>Click-thru recreation of the core Voya app flow — explore, plan with AI, follow a live itinerary, and check your travel journal.</p>
    <div class="screens" id="screens"></div>
  </div>
  <div class="device-wrap" id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>

  <!-- Components -->
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="VoyaUI.jsx"></script>
  <script type="text/babel" src="HomeScreen.jsx"></script>
  <script type="text/babel" src="SearchScreen.jsx"></script>
  <script type="text/babel" src="TripScreen.jsx"></script>
  <script type="text/babel" src="LiveScreen.jsx"></script>
  <script type="text/babel" src="ProfileScreen.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel">
    function tryMount(attempt) {
      attempt = attempt || 0;
      const need = ['VoyaApp', 'IOSDevice', 'HomeScreen', 'voyaColors', 'VoyaTabBar'];
      const missing = need.filter(n => typeof window[n] === 'undefined');
      if (missing.length && attempt < 40) { setTimeout(() => tryMount(attempt + 1), 50); return; }
      const root = document.getElementById('root');
      if (missing.length) {
        root.innerHTML = '<pre style="font:13px monospace; color:#b53a25; padding:20px; background:#fff;">Missing: ' + missing.join(', ') + '</pre>';
        return;
      }
      try {
        ReactDOM.createRoot(root).render(<VoyaApp/>);
        setTimeout(() => window.lucide && lucide.createIcons(), 50);
      } catch (e) {
        root.innerHTML = '<pre style="font:13px monospace; color:#b53a25; padding:20px; background:#fff;">Render error: ' + e.message + '\\n' + (e.stack || '') + '</pre>';
      }
    }
    tryMount();
  </script>
</body>
</html>
