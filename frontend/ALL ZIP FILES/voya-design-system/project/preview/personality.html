<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 22px 24px; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .tile {
    aspect-ratio: 1;
    background: var(--voya-sky);
    border-radius: 18px;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 8px;
    padding: 12px 6px;
  }
  .icon-stage { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }
  .label {
    font-family: 'Plus Jakarta Sans', system-ui;
    font-size: 11px; color: var(--voya-navy);
    font-weight: 500; text-align: center;
  }
</style></head>
<body><div class="card">
  <div class="grid">

    <div class="tile">
      <div class="icon-stage">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#378ADD" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.8 19.2L16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/>
        </svg>
      </div>
      <span class="label">adventurous</span>
    </div>

    <div class="tile">
      <div class="icon-stage">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#9FC7F1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 18a4 4 0 0 0 0-8 5.5 5.5 0 0 0-10.5 1.5A4.5 4.5 0 0 0 7 18h10z" fill="#CFE3F8"/>
        </svg>
      </div>
      <span class="label">stress-free</span>
    </div>

    <div class="tile">
      <div class="icon-stage">
        <svg width="40" height="40" viewBox="0 0 40 40">
          <circle cx="20" cy="14" r="8" fill="#EF9F27"/>
          <path d="M 4 28 C 10 24, 14 32, 20 28 S 30 24, 36 30 L 36 36 L 4 36 Z" fill="#378ADD"/>
          <path d="M 8 24 C 12 22, 14 26, 18 24" stroke="#378ADD" stroke-width="2" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="label">warm + playful</span>
    </div>

    <div class="tile">
      <div class="icon-stage">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#378ADD" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76" fill="#EF9F27" stroke="#EF9F27"/>
        </svg>
      </div>
      <span class="label">smart</span>
    </div>

    <div class="tile">
      <div class="icon-stage">
        <svg width="34" height="40" viewBox="0 0 24 32">
          <path d="M12 0c-6.6 0-12 5.2-12 11.6 0 9 12 20.4 12 20.4s12-11.4 12-20.4C24 5.2 18.6 0 12 0z" fill="#EF9F27"/>
          <circle cx="12" cy="11" r="4" fill="#F1EFE8"/>
        </svg>
      </div>
      <span class="label">travel-native</span>
    </div>

    <div class="tile">
      <div class="icon-stage">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="#378ADD">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </div>
      <span class="label">comforting</span>
    </div>

  </div>
</div></body></html>
