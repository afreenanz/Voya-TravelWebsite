<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 22px 28px; }
  .row { display: flex; align-items: flex-end; gap: 18px; justify-content: space-between; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
  .bar { background: var(--voya-ocean); border-radius: 4px; width: 100%; max-width: 60px; }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); }
  .val { font-family: var(--font-display); font-weight: 800; font-size: 13px; color: var(--voya-navy); }
</style></head>
<body><div class="card"><div class="row">
  <div class="item"><div class="bar" style="height:4px"></div>  <span class="val">4</span><span class="name">space-1</span></div>
  <div class="item"><div class="bar" style="height:8px"></div>  <span class="val">8</span><span class="name">space-2</span></div>
  <div class="item"><div class="bar" style="height:12px"></div> <span class="val">12</span><span class="name">space-3</span></div>
  <div class="item"><div class="bar" style="height:16px"></div> <span class="val">16</span><span class="name">space-4</span></div>
  <div class="item"><div class="bar" style="height:24px"></div> <span class="val">24</span><span class="name">space-6</span></div>
  <div class="item"><div class="bar" style="height:32px"></div> <span class="val">32</span><span class="name">space-8</span></div>
  <div class="item"><div class="bar" style="height:48px"></div> <span class="val">48</span><span class="name">space-12</span></div>
  <div class="item"><div class="bar" style="height:64px"></div> <span class="val">64</span><span class="name">space-16</span></div>
  <div class="item"><div class="bar" style="height:96px"></div> <span class="val">96</span><span class="name">space-24</span></div>
</div></div></body></html>
