<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 24px 28px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
  .btn {
    font-family: var(--font-display); font-weight: 800;
    font-size: 15px; padding: 12px 22px; border-radius: 999px;
    border: none; cursor: pointer; display: inline-flex;
    align-items: center; gap: 8px; transition: all 140ms;
    letter-spacing: -0.005em;
  }
  .primary  { background: var(--voya-ocean); color: #fff;
              box-shadow: 0 6px 18px rgba(55,138,221,0.32); }
  .amber    { background: var(--voya-amber); color: #fff;
              box-shadow: 0 8px 24px rgba(239,159,39,0.40); }
  .navy     { background: var(--voya-navy); color: var(--voya-cream); }
  .outline  { background: transparent; color: var(--voya-navy);
              box-shadow: inset 0 0 0 1.5px var(--voya-navy); }
  .ghost    { background: transparent; color: var(--voya-navy); }
  .small    { padding: 8px 16px; font-size: 13px; }
  .icon-btn { width: 40px; height: 40px; padding: 0; justify-content: center; border-radius: 999px;
              background: #fff; color: var(--voya-navy); box-shadow: 0 2px 6px rgba(12,68,124,0.10); }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); margin-bottom: 10px; display: block; }
  .group + .group { margin-top: 16px; }
</style></head>
<body><div class="card">
  <div class="group">
    <span class="label">Primary actions</span>
    <div class="row">
      <button class="btn primary">Plan my trip <span>→</span></button>
      <button class="btn amber">Book now</button>
      <button class="btn navy">Continue</button>
    </div>
  </div>
  <div class="group">
    <span class="label">Secondary &amp; ghost · small &amp; icon</span>
    <div class="row">
      <button class="btn outline">See itinerary</button>
      <button class="btn ghost">Skip</button>
      <button class="btn primary small">Add stop</button>
      <button class="icon-btn" aria-label="map">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21 3 6"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
      </button>
    </div>
  </div>
</div></body></html>
