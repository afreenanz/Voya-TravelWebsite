<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 22px 28px; display: flex; flex-direction: column; gap: 6px; }
  .line { display: grid; grid-template-columns: 1fr 200px; align-items: baseline; gap: 16px; }
  .specimen { color: var(--voya-navy); font-family: 'Clash Grotesk', system-ui; margin: 0; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); text-align: right; }
  .l1 { font-size: 56px; font-weight: 700; letter-spacing: -0.035em; line-height: 1.0; }
  .l2 { font-size: 40px; font-weight: 700; letter-spacing: -0.03em;  line-height: 1.05; }
  .l3 { font-size: 28px; font-weight: 600; letter-spacing: -0.02em;  line-height: 1.15; }
  .l4 { font-size: 20px; font-weight: 600; letter-spacing: -0.01em;  line-height: 1.25; }
  .l5 { font-size: 16px; font-weight: 600; line-height: 1.4; }
</style></head>
<body><div class="card">
  <div class="line"><h1 class="specimen l1">Where to next?</h1><span class="meta">Display · Clash 700</span></div>
  <div class="line"><h2 class="specimen l2">Plan a trip</h2><span class="meta">H1 · Clash 700</span></div>
  <div class="line"><h3 class="specimen l3">Day 3 in Lisbon</h3><span class="meta">H2 · Clash 600</span></div>
  <div class="line"><h4 class="specimen l4">Booked flights</h4><span class="meta">H3 · Clash 600</span></div>
  <div class="line"><h5 class="specimen l5">3 stops · 6 days</h5><span class="meta">H4 · Clash 600</span></div>
</div></body></html>
