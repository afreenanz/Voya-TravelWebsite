<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 24px 28px; display: flex; gap: 24px; align-items: center; justify-content: center; min-height: 100%; }
  .group { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .icon-tile {
    width: 96px; height: 96px;
    border-radius: 22px;
    box-shadow: 0 14px 28px rgba(12,68,124,0.18);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .light { background: #FFFFFF; }
  .dark  { background: #042B5B; }
  img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .lbl {
    font-family: 'Clash Grotesk', 'Plus Jakarta Sans', system-ui;
    font-weight: 600; font-size: 11px; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--fg-2);
  }
</style></head>
<body><div class="card">
  <div class="group">
    <div class="icon-tile light"><img src="../assets/voya-app-icon-light.png" alt="Voya app icon, light"></div>
    <span class="lbl">App icon · light</span>
  </div>
  <div class="group">
    <div class="icon-tile dark"><img src="../assets/voya-app-icon-dark.png" alt="Voya app icon, dark"></div>
    <span class="lbl">App icon · dark</span>
  </div>
</div></body></html>
