<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--voya-navy); }
  .card { padding: 18px 22px; color: var(--voya-cream); }
  .row { display: flex; align-items: center; gap: 22px; }
  .pill {
    background: var(--voya-ocean);
    color: #fff;
    padding: 8px 14px; border-radius: 999px;
    font-family: 'Clash Grotesk', 'Plus Jakarta Sans', system-ui;
    font-weight: 700; font-size: 12px;
    letter-spacing: 0.10em; text-transform: uppercase;
    flex-shrink: 0;
  }
  .headline {
    font-family: 'Clash Grotesk', 'Plus Jakarta Sans', system-ui;
    font-weight: 600; font-size: 18px; line-height: 1.3;
    margin: 0; letter-spacing: -0.005em;
  }
  .accent { color: var(--voya-amber); font-weight: 700; }
  .pillars { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-top: 16px; }
  .pillar { display: flex; align-items: flex-start; gap: 10px; }
  .pillar-icon {
    width: 28px; height: 28px;
    color: var(--voya-amber);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  }
  .pillar-text { display: flex; flex-direction: column; gap: 2px; }
  .ptitle {
    font-family: 'Clash Grotesk', 'Plus Jakarta Sans', system-ui;
    font-weight: 700; font-size: 12px;
    color: var(--voya-cream);
  }
  .pbody {
    font-family: 'Plus Jakarta Sans', system-ui;
    font-size: 11px; color: rgba(241,239,232,0.70); line-height: 1.4;
  }
</style></head>
<body><div class="card">
  <div class="row">
    <div class="pill">08 · BRAND PROMISE</div>
    <h2 class="headline">
      We make travel easy,<br/>so you can <span class="accent">enjoy the journey.</span>
    </h2>
  </div>
  <div class="pillars">
    <div class="pillar">
      <div class="pillar-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5z"/></svg>
      </div>
      <div class="pillar-text">
        <span class="ptitle">Smart Planning</span>
        <span class="pbody">AI-powered itineraries tailored for you.</span>
      </div>
    </div>
    <div class="pillar">
      <div class="pillar-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 18a4 4 0 0 0 0-8 5.5 5.5 0 0 0-10.5 1.5A4.5 4.5 0 0 0 7 18h10z"/></svg>
      </div>
      <div class="pillar-text">
        <span class="ptitle">Stress-Free Travel</span>
        <span class="pbody">We handle the details, you enjoy the journey.</span>
      </div>
    </div>
    <div class="pillar">
      <div class="pillar-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="4"/><path d="M3 7h4l2-3h6l2 3h4v12H3z"/></svg>
      </div>
      <div class="pillar-text">
        <span class="ptitle">Curated Experiences</span>
        <span class="pbody">Handpicked activities you'll love.</span>
      </div>
    </div>
    <div class="pillar">
      <div class="pillar-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </div>
      <div class="pillar-text">
        <span class="ptitle">Support 24/7</span>
        <span class="pbody">We're here anytime, anywhere.</span>
      </div>
    </div>
  </div>
</div></body></html>
