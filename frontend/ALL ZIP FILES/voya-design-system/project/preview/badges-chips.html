<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 24px 28px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 999px;
    font-family: var(--font-body); font-weight: 500; font-size: 13px;
  }
  .chip svg { width: 14px; height: 14px; }
  .ocean { background: rgba(55,138,221,0.14); color: var(--voya-ocean-700); }
  .amber { background: rgba(239,159,39,0.18); color: var(--voya-amber-700); }
  .navy  { background: var(--voya-navy); color: #fff; }
  .cream { background: var(--voya-cream-300); color: var(--voya-navy); }
  .success { background: rgba(47,165,106,0.16); color: #1e7a4d; }
  .danger  { background: rgba(226,85,61,0.16); color: #b53a25; }
  .outline { background: transparent; color: var(--voya-navy); box-shadow: inset 0 0 0 1.5px rgba(12,68,124,0.30); }
  .dot { width: 6px; height: 6px; border-radius: 999px; background: currentColor; }
  .group + .group { margin-top: 6px; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); margin-bottom: 8px; display: block; }
</style></head>
<body><div class="card">
  <div class="group">
    <span class="label">Tag &amp; filter chips</span>
    <div class="row">
      <span class="chip ocean">Beach</span>
      <span class="chip ocean">Food</span>
      <span class="chip amber">Budget · €€</span>
      <span class="chip cream">+ 4 more</span>
      <span class="chip outline">Filters · 3</span>
    </div>
  </div>
  <div class="group">
    <span class="label">Status badges</span>
    <div class="row">
      <span class="chip success"><span class="dot"></span>Booked</span>
      <span class="chip amber"><span class="dot"></span>Awaiting confirmation</span>
      <span class="chip danger"><span class="dot"></span>Delay 2h 14m</span>
      <span class="chip navy">Pro plan</span>
    </div>
  </div>
</div></body></html>
