<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .swatch { border-radius: 16px; height: 140px; padding: 14px;
    display: flex; flex-direction: column; justify-content: space-between;
    box-shadow: 0 2px 6px rgba(12,68,124,0.08); }
  .name { font-family: 'Clash Grotesk', 'Plus Jakarta Sans', system-ui; font-weight: 700; font-size: 15px; }
  .hex  { font-family: var(--font-mono); font-size: 11px; opacity: 0.85; }
  .light { color: var(--voya-cream); }
  .dark  { color: var(--voya-navy); }
</style></head>
<body><div class="card">
  <div class="grid">
    <div class="swatch dark"  style="background:#0C447C; color:#F1EFE8"><span class="name">Deep Navy</span><span class="hex">#0C447C</span></div>
    <div class="swatch light" style="background:#378ADD"><span class="name">Ocean Blue</span><span class="hex">#378ADD</span></div>
    <div class="swatch dark"  style="background:#EF9F27"><span class="name">Amber Orange</span><span class="hex">#EF9F27</span></div>
    <div class="swatch dark"  style="background:#F1EFE8; border:1px solid rgba(44,44,42,0.10)"><span class="name">Off White</span><span class="hex">#F1EFE8</span></div>
    <div class="swatch dark"  style="background:#E6F2FB; border:1px solid rgba(44,44,42,0.06)"><span class="name">Sky Tint</span><span class="hex">#E6F2FB</span></div>
    <div class="swatch light" style="background:#2C2C2A"><span class="name">Ink</span><span class="hex">#2C2C2A</span></div>
  </div>
</div></body></html>
