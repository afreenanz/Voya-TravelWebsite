<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 24px 28px; }
  .spec {
    font-family: 'Clash Grotesk', system-ui;
    font-weight: 700;
    font-size: 96px;
    line-height: 0.95;
    letter-spacing: -0.04em;
    color: var(--voya-navy);

  .spec em { font-style: normal; color: var(--voya-amber); }
  .meta { display: flex; gap: 18px; margin-top: 14px;

</style></head>
<body><div class="card">
  <h1 class="spec">Travel <em>more.</em></h1>
  <div class="meta">
    <span>Clash · 700</span>
    <span>96 / 91</span>
    <span>tracking -0.04em</span>
