<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 28px 28px 24px; }
  .row { display: flex; gap: 24px; align-items: flex-end; justify-content: space-around; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .box  { background: #fff; height: 80px; width: 90px; border-radius: 18px; }
  .name { font-family: var(--font-display); font-weight: 800; font-size: 13px; color: var(--voya-navy); }
  .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); text-align: center; line-height: 1.4; }
</style></head>
<body><div class="card"><div class="row">
  <div class="item"><div class="box" style="box-shadow: 0 1px 2px rgba(12,68,124,0.06)"></div>
    <div><span class="name">xs</span><div class="meta">inputs · chips</div></div></div>
  <div class="item"><div class="box" style="box-shadow: 0 2px 6px rgba(12,68,124,0.08)"></div>
    <div><span class="name">sm</span><div class="meta">resting card</div></div></div>
  <div class="item"><div class="box" style="box-shadow: 0 6px 18px rgba(12,68,124,0.10)"></div>
    <div><span class="name">md</span><div class="meta">popover · hover</div></div></div>
  <div class="item"><div class="box" style="box-shadow: 0 14px 36px rgba(12,68,124,0.14)"></div>
    <div><span class="name">lg</span><div class="meta">modal · hero card</div></div></div>
  <div class="item"><div class="box" style="box-shadow: 0 24px 60px rgba(12,68,124,0.18)"></div>
    <div><span class="name">xl</span><div class="meta">toast · drag</div></div></div>
  <div class="item"><div class="box" style="background:#EF9F27; box-shadow: 0 8px 24px rgba(239,159,39,0.40)"></div>
    <div><span class="name">amber</span><div class="meta">CTA glow</div></div></div>
</div></div></body></html>
