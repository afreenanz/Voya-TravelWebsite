<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 22px 28px; }
  .row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 16px; align-items: end; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; }
  .swatch {
    background: var(--voya-sky);
    border: 1.5px solid var(--voya-ocean);
    height: 64px; width: 100%;
  }
  .accent {
    background: var(--voya-amber);
    border: none;
  }
  .navy {
    background: var(--voya-navy);
    border: none;
  }
  .label { display: flex; flex-direction: column; gap: 2px; }
  .name {
    font-family: var(--font-display), system-ui;
    font-weight: 700; font-size: 12px;
    color: var(--voya-navy);
    letter-spacing: -0.005em;
  }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
  .use { font-family: var(--font-body), system-ui; font-size: 10.5px; color: var(--fg-2); line-height: 1.3; }
</style></head>
<body><div class="card">
  <div class="row">
    <div class="col">
      <div class="swatch" style="border-radius:6px"></div>
      <div class="label"><span class="name">xs</span><span class="px">6px</span></div>
      <div class="use">tiny inline tags</div>
    </div>
    <div class="col">
      <div class="swatch" style="border-radius:10px"></div>
      <div class="label"><span class="name">sm</span><span class="px">10px</span></div>
      <div class="use">chips · small tiles</div>
    </div>
    <div class="col">
      <div class="swatch" style="border-radius:14px"></div>
      <div class="label"><span class="name">md</span><span class="px">14px</span></div>
      <div class="use">inputs · fields</div>
    </div>
    <div class="col">
      <div class="swatch" style="border-radius:20px"></div>
      <div class="label"><span class="name">lg</span><span class="px">20px</span></div>
      <div class="use">cards (default)</div>
    </div>
    <div class="col">
      <div class="swatch" style="border-radius:28px"></div>
      <div class="label"><span class="name">xl</span><span class="px">28px</span></div>
      <div class="use">hero cards · sheets</div>
    </div>
    <div class="col">
      <div class="swatch accent" style="border-radius:36px"></div>
      <div class="label"><span class="name">2xl</span><span class="px">36px</span></div>
      <div class="use">soft photo tiles</div>
    </div>
    <div class="col">
      <div class="swatch navy" style="border-radius:999px"></div>
      <div class="label"><span class="name">pill</span><span class="px">∞</span></div>
      <div class="use">buttons · chips</div>
    </div>
  </div>
</div></body></html>
