<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 22px 28px; display: flex; flex-direction: column; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .label { font-family: var(--font-body); font-size: 12px; font-weight: 500; color: var(--fg-2); }
  .input {
    font-family: var(--font-body); font-size: 15px;
    padding: 12px 14px; border-radius: 14px;
    border: 1.5px solid rgba(44,44,42,0.14); background: #fff;
    color: var(--fg-1); outline: none;
  }
  .input.focused { border-color: var(--voya-ocean); box-shadow: 0 0 0 4px rgba(55,138,221,0.16); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .with-icon { display: flex; align-items: center; gap: 10px;
               padding: 10px 14px; border-radius: 999px; background: #fff;
               border: 1.5px solid rgba(44,44,42,0.14); }
  .with-icon input { border: 0; outline: 0; flex: 1; font-family: var(--font-body); font-size: 15px; background: transparent; }
  .with-icon svg { color: var(--voya-ocean); flex-shrink: 0; }
  .seg { display: inline-flex; padding: 4px; background: var(--voya-cream-100); border-radius: 999px; gap: 2px; align-self: flex-start; }
  .seg button { border: 0; background: transparent; padding: 8px 16px; border-radius: 999px;
                font-family: var(--font-display); font-weight: 700; font-size: 13px; color: var(--fg-2); cursor: pointer; }
  .seg button.on { background: #fff; color: var(--voya-navy); box-shadow: 0 2px 6px rgba(12,68,124,0.10); }
</style></head>
<body><div class="card">
  <div class="row">
    <div class="field">
      <span class="label">Where to?</span>
      <div class="with-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="3"/><path d="M12 22s-7-7.58-7-12a7 7 0 0 1 14 0c0 4.42-7 12-7 12z"/></svg>
        <input value="Lisbon, Portugal" />
      </div>
    </div>
    <div class="field">
      <span class="label">When?</span>
      <input class="input focused" value="May 14 – May 20" />
    </div>
  </div>
  <div class="seg">
    <button class="on">Round trip</button>
    <button>One way</button>
    <button>Multi-city</button>
  </div>
</div></body></html>
