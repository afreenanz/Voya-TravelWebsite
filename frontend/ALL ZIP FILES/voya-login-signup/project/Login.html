  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; min-height: 100vh; }
    #root { min-height: 100vh; display: flex; }

    @keyframes dotPulse {
      0%, 80%, 100% { transform: scale(0.65); opacity: 0.35; }
      40% { transform: scale(1); opacity: 1; }
    }
    @keyframes routeDraw {
      from { stroke-dashoffset: 700; }
      to   { stroke-dashoffset: 0; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pinDrop {
      0%   { transform: scale(0) translateY(-8px); opacity: 0; }
      60%  { transform: scale(1.15) translateY(0); opacity: 1; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(28px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes successPop {
      0%   { transform: scale(0) rotate(-12deg); opacity: 0; }
      55%  { transform: scale(1.22) rotate(4deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes successFadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shakeX {
      0%, 100% { transform: translateX(0); }
      18%      { transform: translateX(-9px); }
      36%      { transform: translateX(9px); }
      54%      { transform: translateX(-5px); }
      72%      { transform: translateX(5px); }
    }
    @keyframes otpPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(55,138,221,0.3); }
      50%      { box-shadow: 0 0 0 6px rgba(55,138,221,0); }
    }

    .route-path {
      stroke-dasharray: 5 9;
      stroke-dashoffset: 700;
      animation: routeDraw 1.4s cubic-bezier(0.2, 0.8, 0.2, 1) 0.4s both;
    }
    .pin-drop        { animation: pinDrop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 1.6s both; }
    .brand-content   { animation: fadeUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) 0.1s both; }

/* ── Loading dots ──────────────────────────────────────────── */

/* ── OTP Input ──────────────────────────────────────────────── */
function OTPInput({ otp, setOtp, error, shake, disabled }) {
  const inputRefs = useRef([]);

  useEffect(() => {
    setTimeout(() => inputRefs.current[0]?.focus(), 80);
  }, []);

  /* Re-focus first box when cleared after error */
  useEffect(() => {
    if (otp.every(d => d === '')) {
      setTimeout(() => inputRefs.current[0]?.focus(), 80);
    }
  }, [otp]);

  const handleChange = (index, e) => {
    const val = e.target.value.replace(/\D/g, '');
    if (!val) {
      const next = [...otp];
      next[index] = '';
      setOtp(next);
      return;
    }
    const next = [...otp];
    next[index] = val[val.length - 1];
    setOtp(next);
    if (index < 5) inputRefs.current[index + 1]?.focus();
  };

  const handleKeyDown = (index, e) => {
    if (e.key === 'Backspace') {
      if (otp[index]) {
        const next = [...otp];
        next[index] = '';
        setOtp(next);
      } else if (index > 0) {
        inputRefs.current[index - 1]?.focus();
        const next = [...otp];
        next[index - 1] = '';
        setOtp(next);
      }
    } else if (e.key === 'ArrowLeft'  && index > 0) inputRefs.current[index - 1]?.focus();
    else if   (e.key === 'ArrowRight' && index < 5) inputRefs.current[index + 1]?.focus();
  };

  const handlePaste = (e) => {
    e.preventDefault();
    const pasted = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
    if (!pasted) return;
    const next = ['', '', '', '', '', ''];
    for (let i = 0; i < pasted.length; i++) next[i] = pasted[i];
    setOtp(next);
    inputRefs.current[Math.min(pasted.length, 5)]?.focus();
  };

  const allFilled  = otp.every(d => d !== '');
  const wrapperCls = `${shake ? 'otp-shake' : ''} ${allFilled && !error ? 'otp-complete' : ''}`.trim();

  return (
    <div className={wrapperCls} style={{ display: 'flex', gap: 10, justifyContent: 'center' }}>
      {otp.map((digit, index) => (
        <input
          key={index}
          ref={el => inputRefs.current[index] = el}
          type="text"
          inputMode="numeric"
          pattern="[0-9]*"
          maxLength={1}
          value={digit}
          disabled={disabled}
          onChange={e => handleChange(index, e)}
          onKeyDown={e => handleKeyDown(index, e)}
          onPaste={handlePaste}
          onFocus={e => e.target.select()}
          style={{
            width: 54, height: 62, textAlign: 'center',
            fontSize: 26, fontFamily: 'var(--font-display)', fontWeight: 700,
            borderRadius: 'var(--radius-md)',
            border: `2px solid ${error ? '#ef4444' : digit ? 'var(--voya-ocean)' : 'var(--border-default)'}`,
            background: error ? '#fef2f2' : digit ? 'rgba(55,138,221,0.04)' : '#fff',
            color: error ? '#ef4444' : 'var(--voya-navy)',
            outline: 'none',
            transition: 'border-color 140ms, box-shadow 140ms, background 140ms',
            boxShadow: digit && !error ? '0 0 0 3px rgba(55,138,221,0.1)' : 'var(--shadow-xs)',
            cursor: disabled ? 'not-allowed' : 'text',
            opacity: disabled ? 0.65 : 1,
          }}
        />
      ))}
    </div>
  );
}

/* ── Shared CTA button ─────────────────────────────────────── */
function CTAButton({ onClick, type='button', disabled, loading, children, fullWidth=true }) {
  const base = {
    width: fullWidth ? '100%' : 'auto',
    fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: 15,
    padding: '15px 28px', borderRadius: 'var(--radius-pill)', border: 'none',
    background: 'var(--voya-ocean)', color: '#fff',
    boxShadow: '0 6px 20px rgba(55,138,221,0.28)',
    cursor: disabled || loading ? (loading ? 'wait' : 'not-allowed') : 'pointer',
    opacity: disabled && !loading ? 0.6 : 1,
    transition: 'all 220ms cubic-bezier(0.2,0.8,0.2,1)',
    display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
  };
  return (
    <button type={type} disabled={disabled || loading} style={base} onClick={onClick}
      onMouseEnter={e => { if (!disabled && !loading) { e.currentTarget.style.transform='translateY(-2px)'; e.currentTarget.style.boxShadow='0 10px 28px rgba(55,138,221,0.36)'; }}}
      onMouseLeave={e => { e.currentTarget.style.transform=''; e.currentTarget.style.boxShadow='0 6px 20px rgba(55,138,221,0.28)'; }}
    >
      {loading ? <Dots/> : children}
    </button>
  );
}

/* ── Auth form ──────────────────────────────────────────────── */
function AuthForm({ mode, setMode }) {
  const [name,         setName]         = useState('');
  const [email,        setEmail]        = useState('');
  const [step,         setStep]         = useState('entry');
  const [otpContext,   setOtpContext]   = useState('login');
  const [otp,          setOtp]          = useState(['','','','','','']);
  const [otpError,     setOtpError]     = useState('');
  const [otpShake,     setOtpShake]     = useState(false);
  const [loading,      setLoading]      = useState(false);
  const [resend,       setResend]       = useState(30);
  const [password,    setPassword]    = useState('');
  const [confirmPwd,  setConfirmPwd]  = useState('');
  const [useOtp,      setUseOtp]      = useState(false);
  const [pwdError,    setPwdError]    = useState('');
  const cooldownRef = useRef(null);
  const isLogin = mode === 'login';

  /* Reset to entry when mode toggle changes */
  useEffect(() => {
    setStep('entry');
    setOtp(['','','','','','']);
    setOtpError('');
    setLoading(false);
    setPassword('');
    setConfirmPwd('');
    setPwdError('');
    setUseOtp(false);
  }, [mode]);

  /* Resend countdown when entering OTP screen */
  useEffect(() => {
    if (step === 'otp') {
      setResend(30);
      clearInterval(cooldownRef.current);
      cooldownRef.current = setInterval(() => {
        setResend(prev => {
          if (prev <= 1) { clearInterval(cooldownRef.current); return 0; }
          return prev - 1;
        });
      }, 1000);
    }
    return () => clearInterval(cooldownRef.current);
  }, [step]);

  /* Auto-verify when all 6 digits are entered */
  useEffect(() => {
    if (step === 'otp' && otp.every(d => d !== '') && !loading) {
      doVerify(otp.join(''));
    }
  }, [otp]);

  const triggerShake = () => {
    setOtpShake(true);
    setTimeout(() => setOtpShake(false), 500);
  };

  const doSendOTP = async () => {
    try {
      await fetch('http://127.0.0.1:5000/send-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
    } catch {}
  };

  const doVerify = async (code) => {
    if (code.length < 6 || loading) return;
    setLoading(true);
    setOtpError('');
    try {
      const res = await fetch('http://127.0.0.1:5000/verify-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, code })
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('voya_user_email', email);
        setStep('success');
      } else {
        setOtpError('Invalid or expired code. Please try again.');
        triggerShake();
        setTimeout(() => setOtp(['','','','','','']), 350);
      }
    } catch (error) {

  console.error(error);

  setOtpError(
    "Unable to verify code. Please try again."
  );

  triggerShake();

    } finally {
      setLoading(false);
    }
  };

  /* Login: check email → route to OTP or no-account */
  const handleLoginContinue = async (e) => {
    e.preventDefault();
    if (!email) return;
    setLoading(true);
    try {
      const res = await fetch('http://127.0.0.1:5000/check-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (data.exists) {
        await doSendOTP();
        setOtpContext('login');
        setStep('otp');
      } else {
        setStep('no-account');
      }
    } catch {
      /* Demo: route to no-account to show the full flow */
      setStep('no-account');
    } finally {
      setLoading(false);
    }
  };

  /* Login: password-based */
  const handleLoginPassword = async (e) => {
    e.preventDefault();
    if (!email || !password) return;
    setLoading(true);
    setPwdError('');
    try {
      const res = await fetch('http://127.0.0.1:5000/login-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('voya_user_email', email);
        if (data.user?.name) localStorage.setItem('voya_user_name', data.user.name);
        setOtpContext('login');
        setStep('success');
      } else {
        setPwdError(data.error || 'Invalid email or password.');
      }
    } catch {
      setPwdError('Unable to sign in. Please try again.');
    } finally {
      setLoading(false);
    }
  };

  /* Signup: create account with password */
  const handleSignupSubmit = async (e) => {
    e.preventDefault();
    if (!name || !email || !password) return;
    if (password.length < 6) { setPwdError('Password must be at least 6 characters.'); return; }
    if (password !== confirmPwd) { setPwdError('Passwords do not match.'); return; }
    setLoading(true);
    setPwdError('');
    try {
      const res = await fetch('http://127.0.0.1:5000/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('voya_user_email', email);
        localStorage.setItem('voya_user_name', name);
        setOtpContext('signup');
        setStep('success');
      } else {
        setPwdError(data.error || 'Failed to create account. Email may already be in use.');
      }
    } catch {
      setPwdError('Unable to create account. Please try again.');
    } finally {
      setLoading(false);
    }
  };

  /* OTP verify button */
  const handleVerifySubmit = (e) => {
    e.preventDefault();
    doVerify(otp.join(''));
  };

  /* Resend code */
  const handleResend = async () => {
    if (resend > 0) return;
    setOtp(['','','','','','']);
    setOtpError('');
    await doSendOTP();
    setResend(30);
    clearInterval(cooldownRef.current);
    cooldownRef.current = setInterval(() => {
      setResend(prev => {
        if (prev <= 1) { clearInterval(cooldownRef.current); return 0; }
        return prev - 1;
      });
    }, 1000);
  };

  /* ── Success screen ──────────────────────────────────────── */
  if (step === 'success') {
    return (
      <div className="screen-enter" style={{ width:'100%', maxWidth:420, textAlign:'center' }}>
        <div className="success-icon" style={{
          width:84, height:84, borderRadius:'50%',
          background:'linear-gradient(135deg, #2FA56A 0%, #1a8a53 100%)',
          display:'flex', alignItems:'center', justifyContent:'center',
          margin:'0 auto 28px',
          boxShadow:'0 14px 36px rgba(47,165,106,0.3)',
        }}>
          {Icon.checkLarge}
        </div>
        <div className="success-copy">
          <h2 style={{ fontFamily:'var(--font-display)', fontSize:32, fontWeight:700, color:'var(--voya-navy)', letterSpacing:'-0.022em', margin:'0 0 12px' }}>
            {otpContext === 'signup' ? "You're all set!" : 'Welcome back!'}
          </h2>
          <p style={{ fontFamily:'var(--font-body)', fontSize:16, color:'var(--fg-2)', margin:'0 0 36px', lineHeight:1.55 }}>
            {otpContext === 'signup'
              ? "Your account is ready. Let's start planning."
              : 'Your next adventure awaits.'}
          </p>
          <CTAButton fullWidth={false} onClick={() => { window.location.href = '../../voya-dashboard%20/project/Voya%20Dashboard.html'; }}>
            Go to Dashboard &nbsp;{Icon.arrow}
          </CTAButton>
        </div>
      </div>
    );
  }

  /* ── OTP screen ─────────────────────────────────────────── */
  if (step === 'otp') {
    const allFilled = otp.every(d => d !== '');
    return (
      <div className="screen-enter" style={{ width:'100%', maxWidth:420 }}>
        <div style={{
          width:60, height:60, borderRadius:'var(--radius-lg)',
          background:'rgba(55,138,221,0.1)',
          display:'flex', alignItems:'center', justifyContent:'center',
          marginBottom:24,
        }}>
          {Icon.mailLarge}
        </div>

        <div style={{ marginBottom:32 }}>
          <h1 style={{ fontFamily:'var(--font-display)', fontSize:34, fontWeight:700, color:'var(--voya-navy)', lineHeight:1.08, letterSpacing:'-0.022em', margin:'0 0 10px' }}>
            Check your email
          </h1>
          <p style={{ fontFamily:'var(--font-body)', fontSize:15, color:'var(--fg-2)', margin:0, lineHeight:1.55 }}>
            We've sent a 6-digit verification code to{' '}
            <span style={{ color:'var(--fg-1)', fontWeight:600 }}>{email}</span>
          </p>
        </div>

        <form onSubmit={handleVerifySubmit}>
          <OTPInput otp={otp} setOtp={setOtp} error={otpError} shake={otpShake} disabled={loading}/>

          {otpError && (
            <p style={{ fontFamily:'var(--font-body)', fontSize:13, color:'#ef4444', textAlign:'center', margin:'14px 0 0', lineHeight:1.45 }}>
              {otpError}
            </p>
          )}

          <div style={{ marginTop:24 }}>
            <CTAButton type="submit" disabled={!allFilled} loading={loading}>
              Verify Code &nbsp;{Icon.arrow}
            </CTAButton>
          </div>
        </form>

        <div style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:6, marginTop:22 }}>
          <button onClick={handleResend} disabled={resend > 0} style={{
            background:'none', border:'none', padding:0,
            fontFamily:'var(--font-body)', fontSize:14, fontWeight:500,
            color: resend > 0 ? 'var(--fg-muted)' : 'var(--fg-link)',
            cursor: resend > 0 ? 'default' : 'pointer',
            transition:'color 140ms',
          }}>
            {resend > 0 ? `Resend in ${resend}s` : 'Resend Code'}
          </button>
          <span style={{ color:'var(--border-default)', fontSize:18, lineHeight:1 }}>·</span>
          <button onClick={() => { setStep('entry'); setOtp(['','','','','','']); setOtpError(''); }} style={{
            background:'none', border:'none', padding:0,
            fontFamily:'var(--font-body)', fontSize:14, fontWeight:500,
            color:'var(--fg-link)', cursor:'pointer', transition:'color 140ms',
          }}>
            Change Email
          </button>
        </div>
      </div>
    );
  }

  /* ── No-account screen ──────────────────────────────────── */
  if (step === 'no-account') {
    return (
      <div className="screen-enter" style={{ width:'100%', maxWidth:420 }}>
        <button onClick={() => setStep('entry')} style={{
          display:'flex', alignItems:'center', gap:6, background:'none', border:'none',
          padding:'0 0 22px', fontFamily:'var(--font-body)', fontSize:14, fontWeight:500,
          color:'var(--fg-2)', cursor:'pointer', transition:'color 140ms',
        }}
          onMouseEnter={e => e.currentTarget.style.color='var(--fg-1)'}
          onMouseLeave={e => e.currentTarget.style.color='var(--fg-2)'}
        >
          ← Back
        </button>

        <div style={{
          width:60, height:60, borderRadius:'var(--radius-lg)',
          background:'rgba(239,159,39,0.12)',
          display:'flex', alignItems:'center', justifyContent:'center',
          marginBottom:24,
        }}>
          {Icon.alert}
        </div>

        <div style={{ marginBottom:28 }}>
          <h1 style={{ fontFamily:'var(--font-display)', fontSize:30, fontWeight:700, color:'var(--voya-navy)', lineHeight:1.1, letterSpacing:'-0.022em', margin:'0 0 10px' }}>
            No account found
          </h1>
          <p style={{ fontFamily:'var(--font-body)', fontSize:15, color:'var(--fg-2)', margin:0, lineHeight:1.55 }}>
            We couldn't find an account for{' '}
            <span style={{ color:'var(--fg-1)', fontWeight:600 }}>{email}</span>.
            {' '}Ready to start your journey?
          </p>
        </div>

        <CTAButton onClick={() => setMode('signup')}>
          Create Account &nbsp;{Icon.arrow}
        </CTAButton>

        <p style={{ fontFamily:'var(--font-body)', fontSize:14, color:'var(--fg-muted)', textAlign:'center', marginTop:16, lineHeight:1.5 }}>
          Have a different email?{' '}
          <button onClick={() => setStep('entry')} style={{ background:'none', border:'none', padding:0, fontFamily:'var(--font-body)', fontSize:14, fontWeight:600, color:'var(--fg-link)', cursor:'pointer' }}>
            Try again
          </button>
        </p>
      </div>
    );
  }

  /* ── Entry screen (login / signup) ─────────────────────── */
  return (
    <div style={{ width:'100%', maxWidth:420 }}>
      {/* Mode toggle */}
      <div style={{ display:'inline-flex', padding:4, background:'var(--voya-cream-100)', borderRadius:'var(--radius-pill)', gap:2, marginBottom:32 }}>
        {[['login','Log in'],['signup','Sign up']].map(([m, label]) => (
          <button key={m} onClick={() => setMode(m)} style={{
            padding:'9px 22px', borderRadius:'var(--radius-pill)', border:'none',
            fontFamily:'var(--font-display)', fontWeight:700, fontSize:14,
            cursor:'pointer', transition:'all 220ms cubic-bezier(0.2,0.8,0.2,1)',
            background: mode === m ? '#fff' : 'transparent',
            color:      mode === m ? 'var(--voya-navy)' : 'var(--fg-3)',
            boxShadow:  mode === m ? 'var(--shadow-sm)' : 'none',
          }}>
            {label}
          </button>
        ))}
      </div>

      {/* Heading */}
      <div style={{ marginBottom:28 }}>
        <h1 style={{ fontFamily:'var(--font-display)', fontSize:34, fontWeight:700, color:'var(--voya-navy)', lineHeight:1.08, letterSpacing:'-0.022em', margin:'0 0 8px' }}>
          {isLogin ? 'Welcome back' : 'Create your account'}
        </h1>
        <p style={{ fontFamily:'var(--font-body)', fontSize:15, color:'var(--fg-2)', margin:0 }}>
          {isLogin
            ? (useOtp ? 'Enter your email to receive a sign-in link.' : 'Sign in with your email and password.')
            : 'Start planning your next adventure.'}
        </p>
      </div>

      {/* Fields */}
      <form onSubmit={isLogin ? (useOtp ? handleLoginContinue : handleLoginPassword) : handleSignupSubmit} style={{ display:'flex', flexDirection:'column', gap:16 }}>
        {!isLogin && (
          <Field label="Full name" placeholder="Alex Torres" value={name} onChange={setName} leadIcon={Icon.person}/>
        )}
        <Field label="Email address" type="email" placeholder="you@example.com" value={email} onChange={setEmail} leadIcon={Icon.mail}/>
        {!useOtp && (
          <Field label="Password" type="password"
            placeholder={isLogin ? 'Enter your password' : 'Create a password (min. 6 characters)'}
            value={password} onChange={v => { setPassword(v); setPwdError(''); }} leadIcon={Icon.lock}/>
        )}
        {!isLogin && !useOtp && (
          <Field label="Confirm password" type="password" placeholder="Re-enter your password"
            value={confirmPwd} onChange={v => { setConfirmPwd(v); setPwdError(''); }} leadIcon={Icon.lock}/>
        )}
        {pwdError && (
          <p style={{ margin:0, fontFamily:'var(--font-body)', fontSize:13, color:'#ef4444', lineHeight:1.45 }}>{pwdError}</p>
        )}
        <div style={{ marginTop:4 }}>
          <CTAButton type="submit" loading={loading}>
            {isLogin
              ? (useOtp ? <>Continue &nbsp;{Icon.arrow}</> : <>Sign in &nbsp;{Icon.arrow}</>)
              : <>Create Account &nbsp;{Icon.arrow}</>}
          </CTAButton>
        </div>
      </form>
      {isLogin && (
        <p style={{ fontFamily:'var(--font-body)', fontSize:13, color:'var(--fg-muted)', textAlign:'center', marginTop:14 }}>
          <button onClick={() => { setUseOtp(u => !u); setPwdError(''); setPassword(''); }}
            style={{ background:'none', border:'none', padding:0, fontFamily:'var(--font-body)', fontSize:13, fontWeight:600, color:'var(--fg-link)', cursor:'pointer' }}>
            {useOtp ? 'Sign in with password instead' : 'Sign in with email link instead'}
          </button>
        </p>
      )}

      {/* Divider */}
      <div style={{ display:'flex', alignItems:'center', gap:14, margin:'24px 0' }}>
        <div style={{ flex:1, height:1, background:'var(--border-soft)' }}/>
        <span style={{ fontFamily:'var(--font-body)', fontSize:13, color:'var(--fg-muted)', whiteSpace:'nowrap' }}>or continue with</span>
        <div style={{ flex:1, height:1, background:'var(--border-soft)' }}/>
      </div>

      {/* Social */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
        {[
          { label: 'Google', icon: <GoogleLogo/>, onClick: () => { window.location.href = 'http://127.0.0.1:5000/auth/google'; } },
          { label: 'Apple',  icon: <AppleLogo/>,  onClick: null },
        ].map(({ label, icon, onClick }) => (
          <button key={label} onClick={onClick || undefined} style={{
            display:'flex', alignItems:'center', justifyContent:'center', gap:9,
            padding:'12px', borderRadius:'var(--radius-pill)',
            border:'1.5px solid var(--border-default)', background:'#fff',
            fontFamily:'var(--font-body)', fontWeight:600, fontSize:14, color:'var(--fg-1)',
            cursor:'pointer', boxShadow:'var(--shadow-xs)',
            transition:'all 140ms cubic-bezier(0.2,0.8,0.2,1)',
          }}
            onMouseEnter={e => { e.currentTarget.style.borderColor='var(--border-strong)'; e.currentTarget.style.boxShadow='var(--shadow-sm)'; e.currentTarget.style.transform='translateY(-1px)'; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor='var(--border-default)'; e.currentTarget.style.boxShadow='var(--shadow-xs)'; e.currentTarget.style.transform=''; }}
          >
            {icon}{label}
          </button>
        ))}
      </div>

      {/* Footer copy */}
      <p style={{ fontFamily:'var(--font-body)', fontSize:13, color:'var(--fg-muted)', textAlign:'center', marginTop:24, lineHeight:1.6 }}>
        {isLogin ? (
          <>Don't have an account?{' '}<button onClick={() => setMode('signup')} style={{ background:'none', border:'none', padding:0, fontFamily:'var(--font-body)', fontSize:13, fontWeight:600, color:'var(--fg-link)', cursor:'pointer' }}>Sign up free →</button></>
        ) : (
          <>By creating an account you agree to our{' '}<a href="#" style={{ color:'var(--fg-link)', textDecoration:'none' }}>Terms</a>{' '}and{' '}<a href="#" style={{ color:'var(--fg-link)', textDecoration:'none' }}>Privacy Policy</a>.</>
        )}
      </p>
    </div>
  );
}

/* ── Split layout ───────────────────────────────────────────── */
function SplitLayout({ panelTheme, mode, setMode }) {
  return (
    <div style={{ display:'flex', minHeight:'100vh', width:'100%' }}>
      <div className="brand-panel-side" style={{ flex:'0 0 42%' }}>
        <BrandPanel theme={panelTheme}/>
      </div>
      <div className="form-panel" style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'48px 64px', background:'var(--bg-surface)', overflowY:'auto' }}>
        {/* Mobile logo */}
        <div className="mobile-logo" style={{ display:'none', alignItems:'center', marginBottom:28 }}>
          <img src="assets/voya-logo-light.png" alt="Voya" style={{ height:30 }}/>
        </div>
        <AuthForm mode={mode} setMode={setMode}/>
        <a href="../../voya-landing-page/project/Landing%20Page.html" style={{ marginTop:32, fontFamily:'var(--font-body)', fontSize:13, color:'var(--fg-muted)', textDecoration:'none', display:'flex', alignItems:'center', gap:4 }}
          onMouseEnter={e => e.currentTarget.style.color='var(--fg-2)'}
          onMouseLeave={e => e.currentTarget.style.color='var(--fg-muted)'}
        >
          ← Back to voya.ai
        </a>
      </div>
    </div>
  );
}

/* ── Centered (modal) layout ────────────────────────────────── */
function CenteredLayout({ mode, setMode }) {
  return (
    <div style={{ minHeight:'100vh', background:'var(--bg-page)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'48px 24px', position:'relative', overflow:'hidden' }}>
      <svg style={{ position:'absolute', inset:0, width:'100%', height:'100%', pointerEvents:'none' }} viewBox="0 0 1440 900" fill="none" preserveAspectRatio="xMidYMid slice">
        <path d="M 80 120 C 380 280, 860 180, 1060 380 S 1260 560, 1380 480" stroke="rgba(55,138,221,0.13)" strokeWidth="2" strokeDasharray="5 10" strokeLinecap="round" fill="none"/>
        <path d="M 60 700 C 300 580, 640 720, 900 620 S 1140 780, 1360 700" stroke="rgba(55,138,221,0.08)" strokeWidth="2" strokeDasharray="5 10" strokeLinecap="round" fill="none"/>
        <circle cx="1060" cy="380" r="8"  fill="rgba(239,159,39,0.45)"/>
        <circle cx="1060" cy="380" r="3.5" fill="rgba(239,159,39,0.8)"/>
        <circle cx="300"  cy="620" r="5"  fill="rgba(55,138,221,0.2)"/>
      </svg>
      <img src="assets/voya-logo-light.png" alt="Voya" style={{ height:34, marginBottom:36, position:'relative' }}/>
      <div style={{ background:'#fff', borderRadius:'var(--radius-2xl)', padding:'48px', boxShadow:'var(--shadow-lg)', width:'100%', maxWidth:468, position:'relative' }}>
        <AuthForm mode={mode} setMode={setMode}/>
      </div>
      <a href="../../voya-landing-page/project/Landing%20Page.html" style={{ marginTop:28, fontFamily:'var(--font-body)', fontSize:13, color:'var(--fg-muted)', textDecoration:'none' }}
        onMouseEnter={e => e.currentTarget.style.color='var(--fg-2)'}
        onMouseLeave={e => e.currentTarget.style.color='var(--fg-muted)'}
      >
        ← Back to voya.ai
      </a>
    </div>
  );
}

/* ── App ────────────────────────────────────────────────────── */
const TWEAK_DEFAULTS = {
  layout:     "split",
  panelTheme: "navy",
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [mode, setMode] = useState(() => {
    const p = new URLSearchParams(window.location.search);
    return p.get('mode') === 'signup' ? 'signup' : 'login';
  });

  return (
    <>
      {t.layout === 'split'
        ? <SplitLayout panelTheme={t.panelTheme} mode={mode} setMode={setMode}/>
        : <CenteredLayout mode={mode} setMode={setMode}/>
      }
      <TweaksPanel>
        <TweakSection label="Layout"/>
        <TweakRadio label="Style" value={t.layout} options={['split','centered']} onChange={v => setTweak('layout', v)}/>
        <TweakSection label="Brand panel"/>
        <TweakRadio label="Theme" value={t.panelTheme} options={['navy','ocean','cream']} onChange={v => setTweak('panelTheme', v)}/>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
