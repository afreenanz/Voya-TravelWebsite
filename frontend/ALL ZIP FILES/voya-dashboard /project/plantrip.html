<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voya · Plan a Trip</title>
  <link rel="stylesheet" href="colors_and_type.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: var(--voya-cream); }
    body { font-family: var(--font-body); color: var(--fg-1); -webkit-font-smoothing: antialiased; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(44,44,42,0.18); border-radius: 99px; }

    input, button, select { font-family: inherit; }
    input::placeholder { color: rgba(44,44,42,0.35); }
    input:focus { outline: none; }

    input[type="date"]::-webkit-calendar-picker-indicator {
      opacity: 0.5; cursor: pointer;
    }

    @keyframes dashFlow {
      from { stroke-dashoffset: 0; }
      to   { stroke-dashoffset: -26; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.38s cubic-bezier(0.2,0.8,0.2,1) both; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React 18 + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>

  <!-- Trip data (plain JS) -->
  <script src="plantrip/data.js"></script>

  <!-- Shared Voya primitives (C, Icon, VBtn, VCard, VChip, VAvatar, VSectionHead) -->
  <script type="text/babel" src="dashboard/components.jsx"></script>

  <!-- Plan trip components (load order matters) -->
  <script type="text/babel" src="plantrip/Sidebar.jsx"></script>
  <script type="text/babel" src="plantrip/PlanForm.jsx"></script>
  <script type="text/babel" src="plantrip/ItineraryView.jsx"></script>
  <script type="text/babel" src="plantrip/MyTripsView.jsx"></script>
  <script type="text/babel" src="plantrip/App.jsx"></script>
</body>
</html>
